name: Deploy Frontend to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        id: deploy
        run: |
          vercel --prod \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --yes \
            2>&1 | tee deploy.log
          cat deploy.log
          URL=$(grep -oE 'https://[^[:space:]]+\.vercel\.app' deploy.log | tail -1 || echo "")
          echo "Captured URL: '$URL'"
          if [ -n "$URL" ]; then
            echo "url=$URL" >> $GITHUB_OUTPUT
          fi
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Save Vercel project info
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "Captured URL: $URL"

          # Save .vercel/project.json to repo via GitHub API
          if [ -f .vercel/project.json ]; then
            echo "=== .vercel/project.json ==="
            cat .vercel/project.json
            CONTENT=$(base64 -w0 .vercel/project.json)
            # Check if file already exists (need SHA for updates)
            SHA=$(curl -s "https://api.github.com/repos/mehmetdem2005/mse-auto/contents/.vercel/project.json" \
              -H "Authorization: Bearer $GH_PAT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
            PAYLOAD="{\"message\":\"ci: save vercel project info\",\"content\":\"$CONTENT\""
            [ -n "$SHA" ] && PAYLOAD="${PAYLOAD},\"sha\":\"$SHA\""
            PAYLOAD="${PAYLOAD}}"
            curl -s -X PUT \
              "https://api.github.com/repos/mehmetdem2005/mse-auto/contents/.vercel/project.json" \
              -H "Authorization: Bearer $GH_PAT" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD" | python3 -c "import sys,json; d=json.load(sys.stdin); print('saved:', d.get('content',{}).get('name','err'))" 2>/dev/null
          fi
          echo "🌐 Vercel URL: $URL" >> $GITHUB_STEP_SUMMARY
