name: Deploy Frontend to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        id: deploy
        run: |
          vercel --prod \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --yes \
            2>&1 | tee deploy.log
          cat deploy.log
          URL=$(grep -oE 'https://[^[:space:]]+\.vercel\.app' deploy.log | tail -1 || echo "")
          echo "Captured URL: '$URL'"
          if [ -n "$URL" ]; then
            echo "url=$URL" >> $GITHUB_OUTPUT
          fi
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Summary
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "🌐 Vercel URL: $URL"
          echo "🌐 Vercel URL: $URL" >> $GITHUB_STEP_SUMMARY
          # Write .vercel/project.json project ID and org to secrets if available
          if [ -f .vercel/project.json ]; then
            cat .vercel/project.json
            ORG_ID=$(python3 -c "import json; d=json.load(open('.vercel/project.json')); print(d.get('orgId',''))" 2>/dev/null)
            PROJ_ID=$(python3 -c "import json; d=json.load(open('.vercel/project.json')); print(d.get('projectId',''))" 2>/dev/null)
            echo "orgId=$ORG_ID projectId=$PROJ_ID"
          fi
