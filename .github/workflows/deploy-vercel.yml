name: Deploy Frontend to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        id: deploy
        run: |
          vercel --prod \
            --token="${{ secrets.VERCEL_TOKEN }}" \
            --yes \
            2>&1 | tee deploy.log
          URL=$(grep -oP 'https://[^ ]+\.vercel\.app' deploy.log | head -1 || echo "")
          if [ -n "$URL" ]; then
            echo "✅ Vercel'e yayınlandı: $URL"
            echo "url=$URL" >> $GITHUB_OUTPUT
          fi
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Summary
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "🌐 Site URL → $URL" >> $GITHUB_STEP_SUMMARY
          # Also write URL to a repo file via API so it's readable
          if [ -n "$URL" ]; then
            curl -s -X PUT \
              "https://api.github.com/repos/mehmetdem2005/mse-auto/contents/DEPLOYMENT_URL.txt" \
              -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
              -H "Content-Type: application/json" \
              -d "{\"message\":\"ci: update deployment URL\",\"content\":\"$(echo "$URL" | base64 -w0)\"}" \
              > /dev/null && echo "URL saved: $URL"
          fi
