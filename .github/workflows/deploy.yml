name: Deploy (Vercel)

# main'e her push'ta mobil-web sitesini Vercel'e otomatik deploy eder.
# (Dashboard kaldırıldı — admin dahil her şey mobil uygulamada; mobil-web tarayıcı erişimini karşılar.)
# Backend (Render) ayrıca main'i izleyip kendi otomatik deploy'unu yapar.
# Tek gereken secret: VERCEL_TOKEN. Diğer değerler public istemci değerleridir
# (Supabase anon key ve URL'ler zaten dağıtılan JS paketinde görünür).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_qD4CCjd1H6f4bYdabzhQHmIZ
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  # Public istemci değerleri (secret değil):
  API_BASE: https://watcher-backend-p0hi.onrender.com
  SUPABASE_URL: https://kozckegiwuaywqkkkntp.supabase.co
  SUPABASE_ANON: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtvemNrZWdpd3VheXdxa2trbnRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NTAyNjgsImV4cCI6MjA5NjUyNjI2OH0.Nr0eD5Ys2DDGwwOLR_aojZDUYTKyiVS2juDvefcE-QU

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Vercel CLI
        run: pnpm add -g vercel@latest

      # ---------------- Mobil web (Expo export) ----------------
      # Web bağımlılıkları yalnız CI'da kurulur; repo'ya (Android kaynağına) yazılmaz.
      - name: Mobil web bağımlılıkları (CI-only)
        working-directory: apps/mobile
        run: |
          npx --yes expo install react-native-web react-dom @expo/metro-runtime react-native-worklets
          pnpm add react-native-css-interop@0.2.5
          node -e "const fs=require('fs');const p='app.json';const d=JSON.parse(fs.readFileSync(p,'utf8'));d.expo.web={output:'single',bundler:'metro'};fs.writeFileSync(p,JSON.stringify(d,null,2))"

      - name: Build mobil web
        working-directory: apps/mobile
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ env.API_BASE }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ env.SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ env.SUPABASE_ANON }}
        run: npx --yes expo export --platform web

      # SEO/a11y + TİPOGRAFİ (ADR-052): tek-sayfa export'ta +html.tsx onurlanmaz;
      # index.html'e meta + lang + GERÇEK font (Inter) + tipografik cila enjekte edilir.
      - name: SEO + tipografi enjekte (dist/index.html)
        working-directory: apps/mobile
        run: |
          node -e "
          const fs=require('fs');const p='dist/index.html';let h=fs.readFileSync(p,'utf8');
          if(!/name=\"description\"/.test(h)){
            const d='Whenly — track anything with AI and get notified the moment it happens. Visas, stock, tenders, regulations, prices and more, in your language.';
            const t='<meta name=\"description\" content=\"'+d+'\"><meta name=\"theme-color\" content=\"#F5F7FB\"><meta property=\"og:title\" content=\"Whenly — AI watcher\"><meta property=\"og:description\" content=\"'+d+'\"><meta property=\"og:type\" content=\"website\">';
            h=h.replace('</head>',t+'</head>');
          }
          if(!/fonts.googleapis/.test(h)){
            const font='<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\"><link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin><link href=\"https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap\" rel=\"stylesheet\">';
            const style='<style>:root{--whenly-font:\"Inter\",-apple-system,BlinkMacSystemFont,\"Segoe UI\",Roboto,sans-serif}html,body,#root,*{font-family:var(--whenly-font)!important}body{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}</style>';
            h=h.replace('</head>',font+style+'</head>');
          }
          fs.writeFileSync(p,h);
          console.log('SEO + Inter font + tipografi cilası enjekte edildi');
          "

      - name: Deploy mobil web → Vercel
        env:
          VERCEL_PROJECT_ID: prj_SMr1qNlncOeXZYrkpu00wwJYH0XZ
        run: |
          cd apps/mobile/dist
          cat > vercel.json <<'JSON'
          {
            "rewrites": [{ "source": "/(.*)", "destination": "/index.html" }],
            "headers": [{
              "source": "/(.*)",
              "headers": [
                { "key": "X-Content-Type-Options", "value": "nosniff" },
                { "key": "X-Frame-Options", "value": "DENY" },
                { "key": "Referrer-Policy", "value": "strict-origin-when-cross-origin" },
                { "key": "Permissions-Policy", "value": "camera=(), microphone=(), geolocation=()" },
                { "key": "Strict-Transport-Security", "value": "max-age=63072000; includeSubDomains; preload" }
              ]
            }]
          }
          JSON
          vercel deploy . --prod --yes --token "$VERCEL_TOKEN" --scope "$VERCEL_ORG_ID"
