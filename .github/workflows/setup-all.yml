name: Full Setup — Supabase + Render + Vercel

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check prerequisites
        env:
          SUPABASE_TOKEN: ${{ secrets.SUPABASE_MANAGEMENT_KEY }}
          RENDER_KEY:     ${{ secrets.RENDER_API_KEY }}
          GH_PAT:         ${{ secrets.GH_PAT }}
        run: |
          echo "SUPABASE_TOKEN set: $([ -n "$SUPABASE_TOKEN" ] && echo YES || echo NO) (${SUPABASE_TOKEN:0:8}...)"
          echo "RENDER_KEY set:     $([ -n "$RENDER_KEY"     ] && echo YES || echo NO) (${RENDER_KEY:0:8}...)"
          echo "GH_PAT set:         $([ -n "$GH_PAT"         ] && echo YES || echo NO)"
          echo "gh version: $(gh --version | head -1)"
          python3 --version

      - name: Test Supabase API
        env:
          SUPABASE_TOKEN: ${{ secrets.SUPABASE_MANAGEMENT_KEY }}
        run: |
          echo "Testing Supabase organizations API..."
          RESP=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://api.supabase.com/v1/organizations" \
            -H "Authorization: Bearer $SUPABASE_TOKEN")
          HTTP_CODE=$(echo "$RESP" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESP" | grep -v "HTTP_STATUS:")
          echo "HTTP status: $HTTP_CODE"
          echo "Body: $BODY"

      - name: Run setup script
        continue-on-error: true
        id: setup_script
        env:
          SUPABASE_TOKEN: ${{ secrets.SUPABASE_MANAGEMENT_KEY }}
          RENDER_KEY:     ${{ secrets.RENDER_API_KEY }}
          GEMINI_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GROQ_KEY:       ${{ secrets.GROQ_API_KEY }}
          GH_PAT:         ${{ secrets.GH_PAT }}
          REPO:           mehmetdem2005/mse-auto
        run: bash -x .github/scripts/setup_all.sh 2>&1 | tee setup_debug.log; exit ${PIPESTATUS[0]}

      - name: Push debug log on failure
        if: steps.setup_script.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config user.email "ci-bot@mse-auto"
          git config user.name "CI Bot"
          git add setup_debug.log
          git commit -m "ci: debug log from failed setup [skip ci]"
          git push origin main
          exit 1

      - name: Cleanup on success
        if: steps.setup_script.outcome == 'success'
        run: rm -f setup_debug.log

      - name: Trigger Vercel deploy
        run: |
          curl -s -X POST \
            "https://api.github.com/repos/mehmetdem2005/mse-auto/actions/workflows/deploy-vercel.yml/dispatches" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d '{"ref":"main"}'
          echo "✓ Vercel deploy tetiklendi"
