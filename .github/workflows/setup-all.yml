name: Full Setup — Supabase + Render + Vercel

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run setup script
        env:
          SUPABASE_TOKEN: ${{ secrets.SUPABASE_MANAGEMENT_KEY }}
          RENDER_KEY:     ${{ secrets.RENDER_API_KEY }}
          GEMINI_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GROQ_KEY:       ${{ secrets.GROQ_API_KEY }}
          GH_PAT:         ${{ secrets.GH_PAT }}
          REPO:           mehmetdem2005/mse-auto
        run: bash .github/scripts/setup_all.sh

      - name: Trigger Vercel deploy
        run: |
          curl -s -X POST \
            "https://api.github.com/repos/mehmetdem2005/mse-auto/actions/workflows/deploy-vercel.yml/dispatches" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d '{"ref":"main"}'
          echo "✓ Vercel deploy tetiklendi"
