name: keepalive

# Render free web servisi 15 dk hareketsizlikte uyur. Bu cron her ~10 dk /health'e
# ping atarak servisi uyanık tutar; böylece içindeki scheduler tick (60 sn) durmaz.
# URL'i repo'da Settings → Secrets and variables → Actions → Variables altında
# RENDER_HEALTH_URL olarak ayarla (yoksa aşağıdaki varsayılan kullanılır).
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="${{ vars.RENDER_HEALTH_URL }}"
          URL="${URL:-https://watcher-backend.onrender.com/health}"
          echo "Pinging $URL"
          # Soğuk başlatma ~50 sn sürebilir; uzun timeout + retry. İstek Render router'a
          # ulaştığı an servis uyanır, bu yüzden ping başarısız olsa bile job'ı kırmıyoruz.
          curl -fsS --max-time 90 --retry 3 --retry-delay 10 "$URL" \
            && echo && echo "OK" \
            || echo "ping cevabı gecikti/başarısız — servis büyük ihtimalle uyanıyor"
