name: Deploy Backend to Render

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'render.yaml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup & Deploy Render Service
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:   ${{ secrets.GROQ_API_KEY }}
          SB_URL:         ${{ secrets.SUPABASE_URL }}
          SB_KEY:         ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -e

          # ── Find or create service ──────────────────────────────────────
          echo "🔍 Servis aranıyor..."
          SERVICES=$(curl -sf "https://api.render.com/v1/services?limit=20" \
            -H "Authorization: Bearer $RENDER_API_KEY" || echo "[]")

          SERVICE_ID=$(echo "$SERVICES" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for item in data:
              if isinstance(item, dict) and item.get('service', {}).get('name') == 'mse-auto-api':
                  print(item['service']['id'])
                  break
          " 2>/dev/null || echo "")

          if [ -z "$SERVICE_ID" ]; then
            echo "🆕 Servis oluşturuluyor..."
            OWNER=$(curl -sf "https://api.render.com/v1/owners?limit=1" \
              -H "Authorization: Bearer $RENDER_API_KEY" | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['owner']['id'])")

            CREATE_RESP=$(curl -sf -X POST "https://api.render.com/v1/services" \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{
                \"type\": \"web_service\",
                \"name\": \"mse-auto-api\",
                \"ownerId\": \"$OWNER\",
                \"repo\": \"https://github.com/mehmetdem2005/mse-auto\",
                \"branch\": \"main\",
                \"rootDir\": \"api\",
                \"serviceDetails\": {
                  \"buildCommand\": \"npm install\",
                  \"startCommand\": \"npm start\",
                  \"plan\": \"free\",
                  \"runtime\": \"node\"
                }
              }")
            SERVICE_ID=$(echo "$CREATE_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['service']['id'])")
            echo "✓ Servis oluşturuldu: $SERVICE_ID"
          else
            echo "✓ Servis bulundu: $SERVICE_ID"
          fi

          # ── Set environment variables ────────────────────────────────────
          echo "⚙️  Env vars ayarlanıyor..."
          ENV_VARS=$(python3 -c "
          import json, os
          pairs = [
              ('GEMINI_API_KEY',           os.environ.get('GEMINI_API_KEY','')),
              ('GROQ_API_KEY',             os.environ.get('GROQ_API_KEY','')),
              ('SUPABASE_URL',             os.environ.get('SB_URL','')),
              ('SUPABASE_SERVICE_ROLE_KEY',os.environ.get('SB_KEY','')),
              ('ALLOWED_ORIGIN',           '*'),
              ('NODE_ENV',                 'production'),
          ]
          print(json.dumps([{'key':k,'value':v} for k,v in pairs if v]))
          ")

          curl -sf -X PUT "https://api.render.com/v1/services/$SERVICE_ID/env-vars" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$ENV_VARS" > /dev/null
          echo "✓ Env vars ayarlandı"

          # ── Trigger deploy ───────────────────────────────────────────────
          echo "🚀 Deploy tetikleniyor..."
          curl -sf -X POST "https://api.render.com/v1/services/$SERVICE_ID/deploys" \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{}' > /dev/null
          echo "✅ Render deploy başlatıldı!"
          echo "SERVICE_ID=$SERVICE_ID" >> $GITHUB_STEP_SUMMARY
          echo "🌐 https://mse-auto-api.onrender.com adresinde yayına girecek."
