name: CI
on:
  push: { branches: [main] }
  pull_request:
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm install
      - name: Typecheck core
        run: npm run typecheck -w @studio/core
      - name: Unit tests
        run: npm run test -w @studio/core
      - name: Build
        run: npm run build
        env:
          # build needs no secrets; runtime env is injected on Vercel/Render
          CI: "true"
