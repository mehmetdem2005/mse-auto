# Watcher — Render Blueprint (ÜCRETSİZ tek servis, $0).
# HTTP + scheduler + monitoring/delivery worker'ları TEK web process'inde döner (start:combined).
# Tek süreç olduğu için kuyruk in-memory'dir (üretici+tüketici aynı süreç); DATABASE_URL
# BİLEREK yok — set edilirse pg-boss'a geçer ve free tier'da Supabase pooler ile sorun çıkar.
# Veri kalıcılığı SUPABASE_URL üzerinden; scheduler her 60 sn zamanı geleni yeniden kuyruğa alır.
# Render free web servisi 15 dk hareketsizlikten sonra uyur; .github/workflows/keepalive.yml
# her ~10 dk /health'e ping atarak uyanık tutar (scheduler tick'i çalışsın diye).
# Gizli değerleri Render panosunda "watcher-secrets" env grubuna gir (sync:false).
envVarGroups:
  - name: watcher-secrets
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: FCM_PROJECT_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: ADMIN_USER_IDS
        sync: false

services:
  - type: web
    name: watcher-backend
    runtime: node
    plan: free
    region: frankfurt
    rootDir: .
    buildCommand: "corepack enable && pnpm install --frozen-lockfile --filter @watcher/backend..."
    startCommand: "pnpm --filter @watcher/backend start:combined"
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - fromGroup: watcher-secrets
