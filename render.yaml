# Render Blueprint — the pipeline worker. ffmpeg is required, so we use a Docker env.
# Two ways to run:
#   (a) Background Worker in `loop` mode (always on)  — set the start command to `loop`.
#   (b) Web Service in `serve` mode (exposes POST /tick + /health) triggered by Supabase
#       pg_cron + pg_net (see supabase/migrations/0003) or any cron — cheaper, observable.
services:
  - type: worker            # change to `web` for serve mode (and set a Health Check Path /health)
    name: auto-shorts-worker
    runtime: docker
    dockerfilePath: ./apps/worker/Dockerfile
    plan: starter
    autoDeploy: true
    envVars:
      - { key: GEMINI_API_KEY, sync: false }
      - { key: SUPABASE_URL, sync: false }
      - { key: SUPABASE_SERVICE_ROLE_KEY, sync: false }
      - { key: YOUTUBE_CLIENT_ID, sync: false }
      - { key: YOUTUBE_CLIENT_SECRET, sync: false }
      - { key: YOUTUBE_REFRESH_TOKEN, sync: false }
      - { key: YOUTUBE_DEFAULT_PRIVACY, value: "private" }
      - { key: ALERT_WEBHOOK_URL, sync: false }
      - { key: WORKER_TOKEN, sync: false }      # required for serve mode /tick auth
      - { key: EMBED_DIM, value: "768" }
      - { key: DAILY_USD_CAP, value: "5" }
      - { key: DAILY_YOUTUBE_UNITS_CAP, value: "8000" }
      - { key: TICK_MS, value: "300000" }
